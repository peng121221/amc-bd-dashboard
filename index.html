<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMC雌马酚 · 达人BD商务后台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#eef1f7; --card:#ffffff; --ink:#1f2733; --ink2:#5a6675; --ink3:#9aa6b6;
  --line:#eaeef4; --primary:#3b6ff6; --primary-soft:#eaf1ff;
  --gold:#c8a24c; --navy:#1f3b73;
  --blue:#3b82f6; --purple:#8b5cf6; --teal:#14b8a6; --orange:#f59e0b; --indigo:#6366f1; --rose:#f43f5e; --green:#22c55e;
  --shadow:0 1px 3px rgba(20,30,50,.06),0 6px 24px rgba(20,30,50,.05);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:inherit;text-decoration:none}
.hidden{display:none!important}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#cfd6e2;border-radius:8px}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#f3efe6 0%,#eaeef6 45%,#e7edf7 100%)}
.login-card{width:400px;max-width:92vw;background:#fff;border-radius:20px;padding:38px 34px;box-shadow:0 20px 60px rgba(30,45,80,.16)}
.login-brand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:24px}
.login-brand h1{font-size:20px;letter-spacing:.5px}
.login-brand p{font-size:12px;color:var(--ink3);letter-spacing:3px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--ink2);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fbfcfe;outline:none;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px var(--primary-soft)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;background:var(--primary);color:#fff;font-weight:600;transition:.15s;font-size:14px}
.btn:hover{filter:brightness(1.05)}
.btn.block{width:100%}
.btn.ghost{background:var(--primary-soft);color:var(--primary)}
.btn.gold{background:#b8893a}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn.line{background:#fff;border:1px solid var(--line);color:var(--ink2);font-weight:500}
.login-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--ink2)}
.login-switch a{color:var(--primary);font-weight:600;cursor:pointer}
.login-err{background:#fff1f2;color:#e11d48;font-size:12.5px;padding:9px 12px;border-radius:9px;margin-bottom:12px}
.login-accounts{margin-top:18px;border-top:1px dashed var(--line);padding-top:14px;font-size:12px;color:var(--ink3);line-height:1.7}
.login-accounts b{color:var(--ink2)}

/* ---------- LOGO MARK ---------- */
.logo-mark{width:40px;height:34px;flex:none}

/* ---------- SHELL ---------- */
#app{display:flex;min-height:100vh}
.sidebar{width:212px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-brand{display:flex;align-items:center;gap:10px;padding:18px 18px 16px}
.sb-brand .t1{font-size:15px;font-weight:700;line-height:1.1}
.sb-brand .t2{font-size:10.5px;color:var(--ink3);letter-spacing:1px}
.nav{flex:1;padding:6px 12px;overflow-y:auto}
.nav a{display:flex;align-items:center;gap:11px;padding:10.5px 12px;border-radius:10px;color:var(--ink2);font-weight:500;margin-bottom:2px;position:relative;transition:.12s}
.nav a svg{width:18px;height:18px;opacity:.8}
.nav a:hover{background:#f5f7fb;color:var(--ink)}
.nav a.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
.nav a.active svg{opacity:1}
.sb-foot{padding:14px 18px;border-top:1px solid var(--line);font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:8px;cursor:pointer}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:62px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;z-index:20}
.search{flex:1;max-width:430px;display:flex;align-items:center;gap:8px;background:#f3f5f9;border-radius:10px;padding:9px 13px;color:var(--ink3)}
.search input{flex:1;border:none;background:none;outline:none;color:var(--ink)}
.tb-pill{display:flex;align-items:center;gap:7px;background:#f3f5f9;border-radius:10px;padding:8px 13px;color:var(--ink2);font-size:13px}
.tb-pill select{border:none;background:none;outline:none;color:var(--ink2)}
.tb-spacer{flex:1}
.bell{position:relative;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink2);background:#f3f5f9}
.bell .badge{position:absolute;top:-4px;right:-4px;background:var(--rose);color:#fff;font-size:10px;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:700}
.me{display:flex;align-items:center;gap:9px}
.me .nm{font-size:13px;font-weight:600;line-height:1.2}.me .rl{font-size:11px;color:var(--ink3)}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex:none}

.content{padding:20px 22px 40px;flex:1}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-head h2{font-size:18px}.page-head p{font-size:12.5px;color:var(--ink3);margin-top:3px}

/* ---------- DASHBOARD ---------- */
.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:16px}
.metric{background:#fff;border-radius:var(--radius);padding:16px 16px 15px;box-shadow:var(--shadow)}
.metric .top{display:flex;justify-content:space-between;align-items:flex-start}
.metric .label{font-size:12.5px;color:var(--ink2)}
.metric .val{font-size:25px;font-weight:750;margin-top:9px;letter-spacing:.5px}
.metric .ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff}
.metric .ic svg{width:21px;height:21px}
.metric .delta{font-size:11.5px;margin-top:9px;color:var(--ink3)}
.metric .delta b{font-weight:700}
.up{color:var(--green)}.down{color:var(--rose)}

.dash{display:grid;grid-template-columns:2fr 1.3fr 1.3fr;gap:14px}
.panel{background:#fff;border-radius:var(--radius);padding:17px 18px;box-shadow:var(--shadow);min-width:0}
.panel .ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.panel .ph h3{font-size:15px}
.panel .ph .more{font-size:12px;color:var(--ink3);cursor:pointer}
.seg{display:inline-flex;background:#f3f5f9;border-radius:8px;padding:3px}
.seg button{padding:5px 11px;border-radius:6px;font-size:12px;color:var(--ink2)}
.seg button.on{background:#fff;color:var(--primary);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.06)}

.donut-wrap{display:flex;align-items:center;gap:12px}
.donut-box{position:relative;width:140px;height:140px;flex:none}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-center .a{font-size:11px;color:var(--ink3)}.donut-center .b{font-size:18px;font-weight:750}
.legend{flex:1;display:flex;flex-direction:column;gap:9px}
.legend .li{display:flex;align-items:center;gap:8px;font-size:12.5px}
.legend .dot{width:9px;height:9px;border-radius:3px;flex:none}
.legend .pn{flex:1;color:var(--ink2)}.legend .pv{font-weight:700;color:var(--ink)}

.funnel{display:flex;flex-direction:column;gap:7px;align-items:center;padding-top:4px}
.fn-row{width:100%;display:flex;align-items:center;gap:10px}
.fn-bar{height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;transition:.4s;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.fn-side{width:74px;font-size:12px;color:var(--ink2);display:flex;justify-content:space-between}
.fn-side b{color:var(--ink)}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12px;color:var(--ink3);font-weight:600;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:11px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafbfd}
.rank-badge{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.cell-bd{display:flex;align-items:center;gap:9px}
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.tag.b{background:#eaf1ff;color:#2563eb}.tag.g{background:#e9f9f0;color:#0f9d58}.tag.o{background:#fff4e5;color:#d97706}
.tag.p{background:#f3ecff;color:#7c3aed}.tag.r{background:#ffecef;color:#e11d48}.tag.gray{background:#eef1f5;color:#64748b}.tag.t{background:#e6f7f4;color:#0d9488}
.mini-spark{height:26px;width:80px}

.feed{display:flex;flex-direction:column;gap:14px}
.feed .it{display:flex;gap:11px;font-size:12.5px}
.feed .tm{color:var(--ink3);flex:none;width:38px}
.feed .dt2{width:8px;height:8px;border-radius:50%;margin-top:4px;flex:none}
.feed .tx{color:var(--ink);line-height:1.5}.feed .tx b{font-weight:700}

.product .pcard{display:flex;gap:13px}
.product .pimg{width:74px;height:92px;border-radius:11px;background:linear-gradient(150deg,#f6f1e7,#eef2f8);flex:none;display:flex;align-items:center;justify-content:center;border:1px solid #efe9dd}
.product .prow{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px dashed var(--line)}
.product .prow .k{color:var(--ink3)}.product .prow .v{font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
.chip{background:#f6f8fc;border:1px solid var(--line);color:var(--ink2);font-size:11.5px;padding:4px 10px;border-radius:20px}

.pending{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.pend{border-radius:13px;padding:14px;display:flex;flex-direction:column;gap:6px}
.pend .pl{font-size:12.5px;color:var(--ink2)}
.pend .pv{font-size:24px;font-weight:750}
.pend.b{background:#eef4ff}.pend.g{background:#eafaf1}.pend.o{background:#fff7ec}.pend.r{background:#fff0f3}

.tips{background:linear-gradient(120deg,#fffaf0,#fff);border:1px solid #f3e9d2}
.tips .ph h3{color:#b8893a}
.tips p{font-size:13px;color:var(--ink2);line-height:1.85}

/* ---------- TABLES / MODULES ---------- */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.toolbar .grow{flex:1}
.tinput{padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;outline:none;min-width:150px}
.tinput:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.table-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.table-scroll{overflow-x:auto}
.table-card .pad{padding:6px 16px}
.pager{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-top:1px solid var(--line);font-size:13px;color:var(--ink2)}
.pager .pg{display:flex;gap:6px}
.pager .pg button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink2)}
.pager .pg button:disabled{opacity:.4;cursor:not-allowed}
.inline-select{padding:5px 8px;border:1px solid var(--line);border-radius:7px;background:#fff;font-size:12.5px;outline:none}
.icon-btn{color:var(--ink3);padding:5px;border-radius:7px}.icon-btn:hover{background:#f0f3f8;color:var(--primary)}
.empty{padding:50px;text-align:center;color:var(--ink3)}

/* charts */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-box{position:relative;height:280px}

/* ---------- MODAL ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(20,28,45,.42);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}
.modal{background:#fff;border-radius:18px;width:540px;max-width:96vw;max-height:90vh;overflow:auto;box-shadow:0 30px 80px rgba(20,30,60,.3)}
.modal .mh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
.modal .mh h3{font-size:16px}
.modal .mb{padding:20px 22px}
.modal .mf{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--line)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/3}
.x{font-size:20px;color:var(--ink3);line-height:1;padding:4px 8px;border-radius:8px}.x:hover{background:#f0f3f8}

/* toast */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:#1f2733;color:#fff;padding:11px 20px;border-radius:11px;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.2);animation:tin .25s}
.toast.ok{background:#0f9d58}.toast.err{background:#e11d48}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
.spin{width:34px;height:34px;border:3px solid var(--primary-soft);border-top-color:var(--primary);border-radius:50%;animation:sp 1s linear infinite;margin:60px auto}
@keyframes sp{to{transform:rotate(360deg)}}
.clickable{cursor:pointer;user-select:none}
.tb-date{position:relative}
.date-panel{position:absolute;top:48px;left:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 40px rgba(20,30,60,.18);padding:14px;width:308px;z-index:60}
.dp-title{font-size:12px;color:var(--ink3);margin-bottom:10px}
.dp-presets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.dp-presets button{padding:9px 6px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink2);font-size:13px;transition:.12s}
.dp-presets button:hover{border-color:var(--primary);color:var(--primary)}
.dp-presets button.on{background:var(--primary-soft);color:var(--primary);border-color:transparent;font-weight:600}
.dp-custom{display:flex;align-items:center;gap:6px;border-top:1px solid var(--line);padding-top:12px}
.dp-custom input{flex:1;min-width:0;padding:7px 8px;border:1px solid var(--line);border-radius:8px;font-size:12px;color:var(--ink)}
.dp-custom span{color:var(--ink3)}
.dp-apply{padding:8px 14px;background:var(--primary);color:#fff;border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap}
.tb-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink2);background:#f3f5f9;cursor:pointer;transition:.12s;flex:none}
.tb-icon:hover{background:#e7ecf4;color:var(--primary)}
.tb-icon.spinning svg{animation:sp .8s linear}
.tb-bell-wrap{position:relative}
.bell-panel{position:absolute;top:48px;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 40px rgba(20,30,60,.18);width:260px;z-index:60;overflow:hidden}
.bell-panel .bh{padding:12px 15px;font-size:13px;font-weight:700;border-bottom:1px solid var(--line);background:#fafbfd}
.bell-item{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--line);color:var(--ink2)}
.bell-item:last-child{border-bottom:none}
.bell-item:hover{background:#f5f8fc}
.bell-item .bv{font-weight:700;color:var(--primary)}
.az-grid{display:grid;grid-template-columns:380px 1fr;gap:14px;align-items:start}
@media(max-width:900px){.az-grid{grid-template-columns:1fr}}
.az-matched{background:#eafaf1;color:#0f9d58;font-size:12.5px;padding:9px 12px;border-radius:9px;margin-bottom:12px;font-weight:600}
.az-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:14px}
.az-score{display:flex;gap:14px;align-items:center}
.az-md{width:76px;height:76px;border-radius:50%;border:5px solid var(--c);display:flex;flex-direction:column;align-items:center;justify-content:center;flex:none}
.az-md span{font-size:25px;font-weight:750;color:var(--c);line-height:1}
.az-md small{font-size:11px;color:var(--ink3);margin-top:2px}
.prio-badge{display:inline-block;color:#fff;font-weight:700;font-size:13px;padding:4px 12px;border-radius:8px}
.az-section{padding:14px 0;border-bottom:1px solid var(--line)}
.az-section:last-of-type{border-bottom:none}
.az-section h4{font-size:13.5px;margin-bottom:10px}
.az-row{display:flex;font-size:13px;padding:5px 0}
.az-row .k{width:104px;color:var(--ink3);flex:none}
.az-row .v{color:var(--ink);flex:1;line-height:1.6}
.hr-chips{display:flex;flex-wrap:wrap;gap:8px}
.hr-chip{font-size:12px;padding:5px 11px;border-radius:20px;background:#f1f3f7;color:var(--ink3);border:1px solid var(--line)}
.hr-chip.on{background:#eafaf1;color:#0f9d58;border-color:#bfe9cf;font-weight:600}
.az-section.sugg p{background:#eef4ff;padding:11px 13px;border-radius:10px;font-size:13.5px;line-height:1.75;color:#1e40af}
.az-section.script p{background:#f7f5ff;padding:12px 14px;border-radius:10px;font-size:13.5px;line-height:1.85;color:var(--ink);white-space:pre-wrap}
.az-section.risk p{background:#fff5f5;padding:11px 13px;border-radius:10px;font-size:13px;line-height:1.7;color:#b91c1c}
.ai-badge{font-size:11px;color:#fff;background:linear-gradient(90deg,#6366f1,#3b82f6);padding:2px 9px;border-radius:20px;vertical-align:middle;font-weight:700}
.bp-summary{margin-bottom:14px;background:linear-gradient(120deg,#f3f6ff,#fff);border:1px solid #e0e8ff}
.bp-summary p{font-size:14px;line-height:1.85;color:var(--ink)}
.bp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(335px,1fr));gap:14px;margin-bottom:16px}
.bp-card{background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:15px}
.bp-card-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.bp-tag{color:#fff;font-size:12px;font-weight:700;padding:3px 11px;border-radius:7px;white-space:nowrap}
.bp-row{font-size:13px;line-height:1.7;padding:4px 0;color:var(--ink2)}
.bp-row b{margin-right:6px}
.bp-row.sugg2{background:#eef4ff;padding:9px 11px;border-radius:9px;margin-top:6px;color:#1e40af}
.todo-brief{display:flex;gap:15px;align-items:center;margin-bottom:14px;background:linear-gradient(120deg,#fff7ed,#fff);border:1px solid #fde9d2}
.tb-icon-lg{font-size:32px;flex:none}
.tb-title{font-size:12.5px;color:var(--ink3);font-weight:600;margin-bottom:4px}
.tb-text{font-size:15px;line-height:1.75;color:var(--ink)}
.chip-btn{padding:7px 13px;border:1px solid var(--line);border-radius:20px;background:#fff;color:var(--ink2);font-size:13px;transition:.12s}
.chip-btn:hover{border-color:var(--primary);color:var(--primary)}
.chip-btn.on{background:var(--primary);color:#fff;border-color:transparent;font-weight:600}
.todo-mine{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink2);cursor:pointer}
.prio{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:7px;color:#fff}
.prio.hi{background:#e11d48}.prio.mid{background:#f59e0b}
.imp-drop{border:2px dashed var(--line);border-radius:14px;padding:34px;text-align:center;color:var(--ink2)}
.imp-maps{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px}
@media(max-width:720px){.imp-maps{grid-template-columns:1fr}}
.imp-map-row{display:flex;align-items:center;gap:10px}
.imp-f{width:96px;flex:none;font-size:13px;color:var(--ink2)}

<script>
/* ============ CONFIG ============ */

/* ============ LOGO ============ */

/* ============ ICONS ============ */

 home:'<path d="M3 11l9-8 9 8M5 9v11h5v-6h4v6h5V9"/>',

 radar:'<path d="M12 2.5l2.2 5.3L20 10l-5.8 2.5L12 18l-2.2-5.5L4 10l5.8-2.2z"/><circle cx="18.5" cy="16.5" r="1.2"/>',

};
const NAV=[
 ['home','首页',IC.home],['todo','AI智能待办',IC.check],['influencers','达人资源库',IC.lib],['import','数据导入',IC.upload],['analyze','达人智能分析',IC.radar],['connections','建联管理',IC.link],
 ['progress','合作进度',IC.flow],['samples','样品寄送',IC.box],['live','直播排期',IC.cal],

];
function svgIcon(p){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;}

/* ============ HELPERS ============ */
const $=id=>document.getElementById(id);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt=n=>Number(n||0).toLocaleString('en-US');
const money=n=>'¥'+Number(n||0).toLocaleString('en-US');
const kfollow=n=>n>=10000?(n/10000).toFixed(1)+'w':fmt(n);
function toast(msg,type=''){const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;$('toast').appendChild(t);setTimeout(()=>t.remove(),2600);}
function initials(name){return name?name.trim().slice(0,2):'·';}
function avaColor(seed){let h=0;for(const c of(seed||'x'))h=(h*31+c.charCodeAt(0))%AVA_COLORS.length;return AVA_COLORS[h];}
function ava(name,size=34,url){return url?`<img class="avatar" src="${url}" alt="${esc(name)}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex:none" onerror="this.outerHTML='<div class=&quot;avatar&quot; style=&quot;width:${size}px;height:${size}px;background:${avaColor(name)}&quot;>'+'${esc(initials(name))}'+'</div>'">`:`<div class="avatar" style="width:${size}px;height:${size}px;background:${avaColor(name)}">${esc(initials(name))}</div>`;}
function memberName(id){const m=state.members.find(x=>x.id===id);return m?m.name:'—';}
function bdOptions(sel){return state.members.map(m=>`<option value="${m.id}" ${m.id===sel?'selected':''}>${esc(m.name)}（${esc(m.role)}）</option>`).join('');}
function opts(arr,sel){return arr.map(v=>`<option ${v===sel?'selected':''}>${v}</option>`).join('');}
function tagFor(v){const map={'合作中':'g','已合作':'b','待跟进':'o','跟进中':'gray','暂停':'r','已签收':'g','已寄样':'b','待寄样':'o','已开播':'g','待开播':'b','待确认':'o','已取消':'gray','已结算':'g'};return map[v]||'gray';}

/* ============ AUTH ============ */
function toggleAuth(signup){$('signupForm').classList.toggle('hidden',!signup);$('loginForm').classList.toggle('hidden',signup);$('loginErr').classList.add('hidden');}
function loginErr(m){const e=$('loginErr');e.textContent=m;e.classList.remove('hidden');}
async function doLogin(){
  const email=$('li-email').value.trim(),pass=$('li-pass').value;
  if(!email||!pass)return loginErr('请输入邮箱和密码');
  $('li-btn').textContent='登录中…';$('li-btn').disabled=true;
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  $('li-btn').textContent='登录';$('li-btn').disabled=false;
  if(error)return loginErr('登录失败：'+(error.message.includes('Invalid')?'邮箱或密码错误':error.message));
  await boot();
}
async function doSignup(){
  const name=$('su-name').value.trim(),email=$('su-email').value.trim(),pass=$('su-pass').value;
  if(!name||!email||!pass)return loginErr('请填写完整信息');
  if(pass.length<6)return loginErr('密码至少6位');
  $('su-btn').textContent='注册中…';$('su-btn').disabled=true;
  const {error}=await sb.auth.signUp({email,password:pass,options:{data:{name,role:'BD'}}});
  if(error){$('su-btn').textContent='注册并登录';$('su-btn').disabled=false;return loginErr('注册失败：'+error.message);}
  const {error:e2}=await sb.auth.signInWithPassword({email,password:pass});
  $('su-btn').textContent='注册并登录';$('su-btn').disabled=false;
  if(e2)return loginErr('注册成功，但自动登录失败，请手动登录');
  await boot();
}
async function doLogout(){await sb.auth.signOut();location.reload();}

/* ============ BOOT ============ */
async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){$('login').classList.remove('hidden');$('app').classList.add('hidden');return;}
  $('login').classList.add('hidden');$('app').classList.remove('hidden');
  // load members + me
  const {data:mem}=await sb.from('bd_members').select('*').order('sort_order');
  state.members=mem||[];
  state.me=state.members.find(m=>m.email===session.user.email)||{name:session.user.email.split('@')[0],role:'BD',id:null};
  $('meName').textContent=state.me.name;$('meRole').textContent=state.me.role;
  $('meAvatar').outerHTML=ava(state.me.name,34,state.me.avatar_url).replace('class="avatar"','id="meAvatar" class="avatar"');
  // 默认统计区间：近7天
  if(!state.dateFrom){const today=new Date();const d7=new Date(today.getTime()-6*864e5);state.preset='7d';state.dateFrom=fmtDate(d7);state.dateTo=fmtDate(today);}
  $('dateRangeLabel').textContent=periodLabel()+' · '+state.dateFrom.slice(5)+'~'+state.dateTo.slice(5);
  buildNav();
  go(state.view||'home');
}
function buildNav(){
  $('nav').innerHTML=NAV.map(([k,label,icon])=>`<a data-k="${k}" onclick="go('${k}')">${svgIcon(icon)}<span>${label}</span></a>`).join('');
}
function go(view){
  state.view=view;state.page=0;
  document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('active',a.dataset.k===view));
  const r={home:renderHome,todo:renderTodo,influencers:renderInfluencers,import:renderImport,analyze:renderAnalyze,connections:renderConnections,progress:renderProgress,samples:renderSamples,live:renderLive,commissions:renderCommissions,review:renderReview,team:renderTeam,bdperf:renderBdPerf,settings:renderSettings}[view];
  $('view').innerHTML='<div class="spin"></div>';
  r();
}
function globalSearchGo(){const q=$('globalSearch').value.trim();go('influencers');setTimeout(()=>{const s=$('inf-search');if(s){s.value=q;renderInfluencers();}},200);}

    </div>
    <div class="panel">
      <div class="ph"><h3>平台来源分布</h3></div>
      <div class="donut-wrap"><div class="donut-box"><canvas id="platChart"></canvas><div class="donut-center"><div class="a">总占比</div><div class="b">100%</div></div></div>
      <div class="legend" id="platLegend"></div></div>
    </div>

    </div>

    </div>
    <div class="panel">
      <div class="ph"><h3>实时合作动态</h3></div>
      <div class="feed">${acti.map(a=>feedItem(a)).join('')||'<div class="empty">暂无动态</div>'}</div>
    </div>
    <div class="panel">
      <div class="ph"><h3>核心单品概览</h3></div>
      <div class="product">
        <div class="pcard"><div class="pimg" style="background:#fff;overflow:hidden"><img src="${PRODUCT_URL}" alt="AMC雌马酚" style="width:100%;height:100%;object-fit:cover;display:block"></div>
          <div style="flex:1">
            <div class="prow"><span class="k">单品</span><span class="v">${esc(product.name||'AMC雌马酚')}</span></div>

async function drawTrend(){
  let tf=state.dateFrom;

  const data=await rpc('api_trend',{d_from:tf,d_to:state.dateTo});
  const labels=data.map(x=>x.dt),vals=data.map(x=>x.cnt);
  if(trendChart)trendChart.destroy();
  const ctx=$('trendChart');if(!ctx)return;
  const g=ctx.getContext('2d').createLinearGradient(0,0,0,220);g.addColorStop(0,'rgba(59,111,246,.22)');g.addColorStop(1,'rgba(59,111,246,0)');
  trendChart=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'BD建联数',data:vals,borderColor:'#3b6ff6',backgroundColor:g,fill:true,tension:.4,pointRadius:labels.length<=10?4:0,pointBackgroundColor:'#3b6ff6',borderWidth:2.5}]},
   options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#f0f3f8'},ticks:{color:'#9aa6b6'}},x:{grid:{display:false},ticks:{color:'#9aa6b6',maxTicksLimit:10}}}}});

/* ---------- 工具栏：日期区间 / 提醒 / 刷新 ---------- */
function periodLabel(){return {today:'今日','7d':'近7天','30d':'近30天','90d':'近90天',month:'本月',all:'累计',custom:'区间'}[state.preset]||'近7天';}
function pad2(n){return String(n).padStart(2,'0');}
function fmtDate(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function toggleDatePicker(e){e&&e.stopPropagation();const p=$('datePanel');const open=p.classList.contains('hidden');closePopovers();if(open){p.classList.remove('hidden');$('dpFrom').value=state.dateFrom;$('dpTo').value=state.dateTo;}}
function setDatePreset(p){
  const today=new Date();let from=new Date(today);
  if(p==='7d')from=new Date(today.getTime()-6*864e5);
  else if(p==='30d')from=new Date(today.getTime()-29*864e5);
  else if(p==='90d')from=new Date(today.getTime()-89*864e5);
  else if(p==='month')from=new Date(today.getFullYear(),today.getMonth(),1);
  else if(p==='all')from=new Date(2020,0,1);
  state.preset=p;applyRange(fmtDate(from),fmtDate(today));
}
function applyCustomDate(){const f=$('dpFrom').value,t=$('dpTo').value;if(!f||!t)return toast('请选择开始和结束日期','err');if(f>t)return toast('开始日期不能晚于结束日期','err');state.preset='custom';applyRange(f,t);}
function applyRange(from,to){
  state.dateFrom=from;state.dateTo=to;
  $('dateRangeLabel').textContent=periodLabel()+' · '+from.slice(5)+'~'+to.slice(5);
  document.querySelectorAll('#datePanel .dp-presets button').forEach(b=>b.classList.toggle('on',b.dataset.p===state.preset));
  closePopovers();
  if(state.view==='home')renderHome();else toast('已切换区间，回首页查看','ok');
}

function drawPlat(plat){
  const total=plat.reduce((s,x)=>s+x.cnt,0)||1;

   options:{cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.label+' '+Math.round(c.raw/total*100)+'%'}}}}});

/* ============ GENERIC DATA ============ */
async function rpc(fn,args){const {data,error}=await sb.rpc(fn,args||{});if(error){console.error(fn,error);toast('数据加载失败：'+error.message,'err');return fn==='api_dashboard'?{}:[];}return data;}
async function insertRow(table,row){row=cleanRow(row);const {error}=await sb.from(table).insert(row);if(error){toast('保存失败：'+error.message,'err');return false;}toast('保存成功','ok');return true;}
async function updateRow(table,id,patch){const {error}=await sb.from(table).update(patch).eq('id',id);if(error){toast('更新失败：'+error.message,'err');return false;}toast('已更新','ok');return true;}
async function deleteRow(table,id){if(!confirm('确认删除这条记录？'))return false;const {error}=await sb.from(table).delete().eq('id',id);if(error){toast('删除失败：'+error.message,'err');return false;}toast('已删除','ok');return true;}

async function runAnalyze(){
  const url=$('az-url').value.trim(), name=$('az-name').value.trim(), content=$('az-content').value.trim();
  if(!url&&!content){toast('请至少填写主页链接或主页文案','err');return;}
  const btn=$('az-btn'); btn.disabled=true; const old=btn.textContent; btn.textContent='AI 分析中（约10-25秒）…';
  $('az-out').innerHTML='<div class="spin"></div>';
  let matched=null, known=null;
  try{
    const sel='nickname,platform,follower_count,category,funnel_stage,status,assigned_bd_id,contact';
    if(name){const {data}=await sb.from('influencers').select(sel).ilike('nickname','%'+name+'%').limit(1); if(data&&data[0])matched=data[0];}
    if(!matched&&url){const key=url.split('?')[0].replace(/\/+$/,'').slice(-24); if(key.length>6){const {data}=await sb.from('influencers').select(sel).ilike('contact','%'+key+'%').limit(1); if(data&&data[0])matched=data[0];}}
    if(matched){known={昵称:matched.nickname,平台:matched.platform,粉丝数:matched.follower_count,达人类型:matched.category,当前合作阶段:matched.funnel_stage,状态:matched.status,负责BD:memberName(matched.assigned_bd_id)};}
  }catch(e){}
  let resp; try{ resp=await sb.functions.invoke('analyze-talent',{body:{url,content,known}}); }catch(e){ resp={error:e}; }
  btn.disabled=false; btn.textContent=old;
  const d=resp&&resp.data;
  if(!d||!d.ok||!d.analysis){ $('az-out').innerHTML=`<div class="empty" style="color:#e11d48">分析失败：${esc((d&&d.error)||(resp&&resp.error&&(resp.error.message||resp.error))||'请稍后重试')}</div>`; return; }
  window.__lastAnalysis={a:d.analysis, matched, url, content, name};
  renderAnalysisResult(d.analysis, matched);
}
function azTxt(v){return Array.isArray(v)?v.join('；'):(v==null?'':(typeof v==='object'?JSON.stringify(v):String(v)));}
function renderAnalysisResult(a, matched){
  const prio=String(a.匹配优先级||'').toUpperCase().slice(0,1);
  const prioColor={S:'#e11d48',A:'#0f9d58',B:'#3b82f6',C:'#f59e0b',D:'#94a3b8'}[prio]||'#3b82f6';
  const hr=a.健康相关性||{};
  const chips=Object.keys(hr).map(k=>`<span class="hr-chip ${hr[k]?'on':''}">${hr[k]?'✓ ':''}${esc(k)}</span>`).join('')||'<span class="hr-chip">—</span>';
  const md=Math.max(0,Math.min(100,Number(a.匹配度)||0));

       <div style="margin-top:7px;font-size:13px;color:var(--ink2)">成交概率 <b style="color:${prioColor};font-size:17px">${esc(azTxt(a.成交概率))||'—'}</b></div>
       <div style="margin-top:5px;font-size:12px;color:var(--ink3)">命中规则：${esc(azTxt(a.命中规则))||'—'}</div></div>

function azCopy(){const t=azTxt(window.__lastAnalysis&&window.__lastAnalysis.a.推荐话术);if(!t)return;navigator.clipboard.writeText(t).then(()=>toast('话术已复制','ok'),()=>toast('复制失败，请手动选择','err'));}
async function azSave(){

async function runBdDiagnosis(){
  const data=window.__bdperf; if(!data||!data.length){toast('暂无绩效数据','err');return;}
  const btn=$('bp-ai'); btn.disabled=true; const old=btn.textContent; btn.textContent='AI 全员诊断中…';
  $('bp-report').innerHTML='<div class="panel" style="margin-bottom:14px;text-align:center"><div class="spin"></div><p style="color:var(--ink3);font-size:13px;margin-top:-22px">AI 正在逐个诊断 BD（全员约 1–2 分钟，请稍候）…</p></div>';
  let resp; try{ resp=await sb.functions.invoke('analyze-bd',{body:{bds:data}}); }catch(e){ resp={error:e}; }
  btn.disabled=false; btn.textContent=old;
  const d=resp&&resp.data;
  if(!d||!d.ok||!d.report){ $('bp-report').innerHTML=`<div class="panel" style="margin-bottom:14px;color:#e11d48">诊断失败：${esc((d&&d.error)||(resp&&resp.error&&(resp.error.message||resp.error))||'请稍后重试')}</div>`; return; }
  renderBdReport(d.report);
}

     <div class="bp-card-h"><div class="cell-bd">${memAva(m.姓名||'',30)}<div><div style="font-weight:700">${esc(m.姓名)}</div><div style="font-size:11.5px;color:var(--ink3)">${esc(azTxt(m.一句话画像))}</div></div></div>
       <div style="text-align:right"><span class="bp-tag" style="background:${tc}">${esc(tag||'—')}</span><div style="font-size:11.5px;color:${gc};font-weight:600;margin-top:4px">${esc(m.评级||'')}</div></div></div>

async function renderTodo(){
  _curRender=renderTodo;
  $('view').innerHTML=`
   <div class="page-head"><div><h2>AI 智能待办 <span class="ai-badge">每日</span></h2><p>每天打开自动按当天数据生成跟进任务，按优先级排好，谁该做什么一目了然</p></div>
     <button class="btn line" onclick="renderTodo()">🔄 刷新今日任务</button></div>
   <div id="todo-brief"></div>
   <div class="toolbar" id="todo-filters"></div>
   <div class="table-card"><div class="table-scroll"><table>
     <thead><tr><th style="width:70px">优先级</th><th style="width:110px">任务</th><th>对象</th><th style="width:90px">负责人</th><th>AI 原因</th></tr></thead>
     <tbody id="todo-body"><tr><td colspan="5" class="empty"><div class="spin"></div></td></tr></tbody>
   </table></div><div class="pager" id="todo-count"></div></div>`;
  const d=await rpc('api_todo_tasks');
  window.__todo=d; state.todoFilter='全部'; state.todoMine=false;
  const N=(d.cui_bo||0)+(d.fu_bo||0)+(d.reach||0);
  $('todo-brief').innerHTML=`<div class="panel todo-brief"><div class="tb-icon-lg">🗓️</div><div><div class="tb-title">AI 今日早报 · ${esc(d.date)}</div>
    <div class="tb-text">今日建议优先处理 <b>${N}</b> 个高价值达人，其中 <b style="color:#e11d48">${d.cui_bo}</b> 个适合催播，<b style="color:#7c3aed">${d.fu_bo}</b> 个适合复播，<b style="color:#2563eb">${d.reach}</b> 个需要二次触达；共 <b>${d.total}</b> 项待办（其中 ${d.high} 项高优先级）。</div></div></div>`;
  const cats=['全部','高优先级','催直播档期','约复播','加私域维护','确认签收','寄样跟进','二次触达'];
  $('todo-filters').innerHTML=cats.map((c,i)=>`<button class="chip-btn ${i===0?'on':''}" onclick="todoFilter('${c}',this)">${c}</button>`).join('')+
    `<label class="todo-mine"><input type="checkbox" onchange="state.todoMine=this.checked;drawTodo()"> 只看我的（${esc(state.me.name)}）</label>`;
  drawTodo();
}
function todoFilter(c,el){state.todoFilter=c;document.querySelectorAll('#todo-filters .chip-btn').forEach(b=>b.classList.toggle('on',b===el));drawTodo();}
function drawTodo(){
  const d=window.__todo; if(!d)return; let tasks=(d.tasks||[]).slice();
  const f=state.todoFilter;
  if(f==='高优先级')tasks=tasks.filter(t=>t.priority==='高');
  else if(f&&f!=='全部')tasks=tasks.filter(t=>t.task===f);
  if(state.todoMine)tasks=tasks.filter(t=>t.owner===state.me.name);
  $('todo-body').innerHTML=tasks.map(t=>`<tr>
    <td><span class="prio ${t.priority==='高'?'hi':'mid'}">${esc(t.priority)}</span></td>
    <td><b>${esc(t.task)}</b></td>
    <td>${esc(t.target)}</td>
    <td>${esc(t.owner)}</td>
    <td style="color:var(--ink2);font-size:12.5px">${esc(t.reason)}</td></tr>`).join('')||'<tr><td colspan="5" class="empty">该分类暂无待办 🎉</td></tr>';
  $('todo-count').innerHTML=`<span>共 ${tasks.length} 项</span>`;
}

/* ============ 数据导入 / 更新 ============ */
const IMPORT_FIELDS=[
  ['nickname','达人昵称 *',['昵称','账号名称','达人昵称','达人名称','达人','账号','主播','名称']],
  ['contact','主页链接',['主页链接','主页','链接','homepage','url','地址']],
  ['platform','平台',['平台']],
  ['follower_count','粉丝数',['粉丝数','粉丝量','粉丝','fans','粉丝数量']],
  ['interaction_rate','互动率',['互动率','互动']],
  ['category','类目/类型',['类目','达人类型','类型','分类','标签','内容方向','赛道']],
  ['ext_gmv','平台GMV',['gmv','成交','带货','销售额','销售']],
  ['region','地区',['地区','城市','地域','区域']],
  ['status','状态',['状态','合作状态','进度']],
  ['owner','负责BD',['负责','bd','负责人','归属']],
  ['note','备注',['备注','简介','说明','描述']]
];
function renderImport(){
  _curRender=renderImport;
  if(!window.XLSX){const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';document.head.appendChild(s);}
  $('view').innerHTML=`<div class="page-head"><div><h2>数据导入 / 更新</h2><p>上传飞书表格或抖音 / 巨量星图 / 百应 / 蒲公英 导出的 Excel/CSV，自动匹配已有达人并更新，新达人自动新增</p></div></div>
   <div class="panel" id="imp-panel">
     <div class="imp-drop"><div style="font-size:30px">📄</div><div style="margin:10px 0;font-weight:600">选择文件（.xlsx / .xls / .csv）</div>
       <div style="font-size:12px;color:var(--ink3)">表头放在第一行即可，列名可在下一步手动调整</div>
       <input type="file" id="imp-file" accept=".xlsx,.xls,.csv" style="margin-top:14px" onchange="impParse(this)"></div>
     <p style="font-size:12px;color:var(--ink3);margin-top:12px;line-height:1.6">说明：按「主页链接」或「达人昵称」匹配已有达人——匹配到则<b>更新</b>对应字段，没匹配到则<b>新增</b>。不会删除任何已有数据。</p>
   </div>`;
}
async function impParse(input){
  if(!input.files||!input.files[0])return;
  if(!window.XLSX){await new Promise(res=>{let n=0;const i=setInterval(()=>{if(window.XLSX||n++>60){clearInterval(i);res();}},100);});}
  if(!window.XLSX){toast('解析库加载失败，请刷新重试','err');return;}
  try{
    const buf=await input.files[0].arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
    let hi=rows.findIndex(r=>r.filter(c=>String(c).trim()).length>=2); if(hi<0)hi=0;
    const headers=(rows[hi]||[]).map(h=>String(h).trim());
    const data=rows.slice(hi+1).filter(r=>r.some(c=>String(c).trim()));
    window.__imp={headers,data};
    const mapping={};
    IMPORT_FIELDS.forEach(([f,l,aliases])=>{mapping[f]=headers.findIndex(h=>h&&aliases.some(a=>h.toLowerCase().includes(a.toLowerCase())));});
    renderImpMapping(headers,data,mapping);
  }catch(e){toast('文件解析失败：'+e.message,'err');}
}
function renderImpMapping(headers,data,mapping){
  const opt=sel=>'<option value="-1">（不导入）</option>'+headers.map((h,i)=>`<option value="${i}" ${i===sel?'selected':''}>${esc(h||('列'+(i+1)))}</option>`).join('');
  const maps=IMPORT_FIELDS.map(([f,label])=>`<div class="imp-map-row"><span class="imp-f">${label}</span><select data-f="${f}" class="inline-select" style="flex:1">${opt(mapping[f])}</select></div>`).join('');
  $('imp-panel').innerHTML=`
   <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-weight:600">字段映射（已自动识别，可调整）</div><div style="font-size:12px;color:var(--ink3)">检测到 ${data.length} 行数据</div></div>
   <div class="imp-maps">${maps}</div>
   <div class="imp-key">按 <select id="imp-key" class="inline-select"><option value="contact">主页链接</option><option value="nickname">达人昵称</option></select> 匹配已有达人（匹配到→更新；没匹配→新增）</div>
   <div style="display:flex;gap:10px;margin-top:14px"><button class="btn" onclick="impPreview()">预览</button><button class="btn line" onclick="renderImport()">重选文件</button></div>
   <div id="imp-result" style="margin-top:14px"></div>`;
}
function impBuildRows(){
  const {headers,data}=window.__imp; const m={}; document.querySelectorAll('#imp-panel select[data-f]').forEach(s=>m[s.dataset.f]=parseInt(s.value));
  const num=v=>{if(v==null)return '';let s=String(v).trim(),mul=1;if(/[万wW]/.test(s)){mul=10000;}s=s.replace(/[,，\s万wW]/g,'').replace(/[^\d.\-]/g,'');const n=parseFloat(s);return isNaN(n)?'':String(Math.round(n*mul));};
  const rate=v=>{if(v==null)return '';const n=parseFloat(String(v).replace('%','').replace(/[^\d.\-]/g,''));return isNaN(n)?'':String(n);};
  return data.map(r=>{const g=f=>m[f]>=0?String(r[m[f]]==null?'':r[m[f]]).trim():'';
    return {nickname:g('nickname'),contact:g('contact'),platform:g('platform'),follower_count:num(g('follower_count')),interaction_rate:rate(g('interaction_rate')),category:g('category'),ext_gmv:num(g('ext_gmv')),region:g('region'),status:g('status'),owner:g('owner'),note:g('note')};
  }).filter(r=>r.nickname||r.contact);
}
function impPreview(){
  const rows=impBuildRows(); window.__impRows=rows; const key=$('imp-key').value;
  if(!rows.length){$('imp-result').innerHTML='<div class="panel" style="color:#e11d48">没有可导入的行（请确认已映射「达人昵称」或「主页链接」）</div>';return;}
  const s=rows[0];
  $('imp-result').innerHTML=`<div class="panel" style="background:#f7f9fc"><div style="font-size:13.5px;line-height:1.9">将导入 <b>${rows.length}</b> 行，按「${key==='contact'?'主页链接':'达人昵称'}」匹配，系统自动判断更新或新增。</div>
    <div style="font-size:12px;color:var(--ink3);margin-top:6px">首行示例：昵称=${esc(s.nickname||'—')}｜平台=${esc(s.platform||'—')}｜粉丝=${esc(s.follower_count||'—')}｜类目=${esc(s.category||'—')}</div>
    <button class="btn" id="imp-go" style="margin-top:12px" onclick="impExecute()">✅ 确认导入</button></div>`;
}
async function impExecute(){
  const rows=window.__impRows; if(!rows||!rows.length)return; const key=$('imp-key').value;
  const btn=$('imp-go'); btn.disabled=true; btn.textContent='导入中…';
  const {data,error}=await sb.rpc('import_influencers',{rows,match_key:key});
  if(error){btn.disabled=false;btn.textContent='✅ 确认导入';$('imp-result').innerHTML=`<div class="panel" style="color:#e11d48">导入失败：${esc(error.message)}</div>`;return;}
  $('imp-result').innerHTML=`<div class="panel" style="background:#eafaf1"><div style="font-size:15px;font-weight:700;color:#0f9d58">✅ 导入完成</div>
    <div style="font-size:14px;margin-top:6px">新增 <b>${data.inserted}</b> 条 · 更新 <b>${data.updated}</b> 条</div>
    <button class="btn line" style="margin-top:12px" onclick="go('influencers')">去达人资源库查看</button></div>`;
  toast('导入成功：新增'+data.inserted+'，更新'+data.updated,'ok');
}

boot();
